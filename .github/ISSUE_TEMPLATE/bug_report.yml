name: 버그 제보
description: chaextractor에서 발생한 오류나 재현 가능한 문제를 알려주세요.
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        제보 감사합니다. 대화 원문, 사용자명, 전화번호, 파일명, 첨부파일 내용처럼 민감할 수 있는 정보는 올리지 말아주세요.
        앱의 "오류 리포트 준비됨" 창에서 만든 진단 리포트는 대화 원문과 파일명을 자동 수집하지 않습니다.
  - type: textarea
    id: summary
    attributes:
      label: 문제 요약
      description: 어떤 문제가 발생했는지 한두 문장으로 적어주세요.
      placeholder: 예) iOS ZIP을 올리면 분석 중 오류가 나고 시작 버튼이 활성화되지 않습니다.
    validations:
      required: true
  - type: dropdown
    id: input_type
    attributes:
      label: 입력 방식
      options:
        - iOS ZIP
        - Android 폴더/파일 선택
        - Windows TXT
        - 잘 모르겠음
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: 브라우저
      options:
        - Chrome
        - Safari
        - Edge
        - Firefox
        - 모바일 브라우저
        - 잘 모르겠음
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      description: 같은 문제를 다시 볼 수 있는 순서를 적어주세요.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
      placeholder: 예) 대화 분석이 끝나고 날짜 목록이 보여야 합니다.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      placeholder: 예) "유효한 대화 파일을 찾을 수 없습니다"라는 오류가 표시됩니다.
    validations:
      required: true
  - type: textarea
    id: diagnostic_report
    attributes:
      label: 진단 리포트
      description: 앱에서 "제보하기"를 누르기 전 리포트가 이미 복사됩니다. 비어 있으면 "리포트 다시 복사"를 눌러 붙여넣어 주세요. 대화 원문/사용자명/파일명은 자동 수집하지 않습니다.
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: 캡처 또는 로그
      description: 화면 캡처나 로그 파일을 이 영역에 드래그해서 첨부할 수 있습니다. 대화 내용, 이름, 연락처, 파일명은 가려주세요.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: 개인정보 확인
      options:
        - label: 대화 원문, 실명, 연락처, 파일명, 첨부파일 내용 등 민감한 정보를 올리지 않았거나 가렸습니다.
          required: true
